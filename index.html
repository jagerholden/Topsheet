<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topsheet — Solidarity</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --dark-olive: #3D4A2A; --lime: #D4E157; --cream: #F5F0E8; --char: #2C2C2C;
    --olive: #6B7A4F; --muted: #8A9A6D; --light-lime: #E8ED8A; --white: #FFFFFF;
    --black: #1A1A1A; --div: #C8C0B4;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', 'Helvetica Neue', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; background: var(--cream); font-family: var(--sans); color: var(--char); }

  .header { background: var(--dark-olive); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-mark { width: 24px; height: 24px; background: var(--black); border-radius: 2px; }
  .header-name { font-size: 12px; font-weight: 700; color: var(--white); letter-spacing: 0.05em; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-email { font-family: var(--mono); font-size: 11px; color: var(--light-lime); opacity: 0.7; }
  .btn-sign-out { font-family: var(--sans); font-size: 11px; font-weight: 500; padding: 5px 12px; background: transparent; color: var(--light-lime); border: 1px solid rgba(232,237,138,0.27); border-radius: 2px; cursor: pointer; opacity: 0.6; transition: opacity 0.2s; }
  .btn-sign-out:hover { opacity: 1; }

  .main { max-width: 780px; margin: 0 auto; padding: 48px 32px; }
  h1 { font-family: var(--serif); font-size: 52px; font-weight: 400; color: var(--dark-olive); margin: 0 0 6px; line-height: 1.05; }
  .date-line { font-size: 14px; color: var(--olive); margin: 0 0 40px; }

  .auth-gate { background: var(--white); border: 1px solid var(--div); border-radius: 4px; padding: 40px 32px; text-align: center; }
  .auth-gate p { margin: 0 0 8px; font-size: 15px; }
  .auth-gate .subtitle { font-size: 12px; color: var(--olive); margin: 0 0 24px; }

  .btn { font-family: var(--sans); font-size: 14px; font-weight: 600; padding: 14px 28px; border: none; border-radius: 3px; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--dark-olive); color: var(--white); }
  .btn-lime { background: var(--lime); color: var(--dark-olive); }
  .btn-google { font-size: 15px; padding: 14px 36px; background: var(--dark-olive); color: var(--white); }
  .button-row { display: flex; gap: 14px; margin-bottom: 40px; }

  .progress-box { background: var(--white); border: 1px solid var(--div); border-radius: 4px; padding: 20px; margin-bottom: 24px; }
  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-msg { font-size: 13px; font-weight: 500; }
  .progress-pct { font-family: var(--mono); font-size: 12px; color: var(--olive); font-weight: 600; }
  .progress-bar { height: 6px; background: var(--cream); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--dark-olive); border-radius: 3px; transition: width 0.4s ease; }
  .progress-fill.indeterminate { animation: indeterminate 1.8s ease-in-out infinite; }
  .progress-sub { font-family: var(--mono); font-size: 10px; color: var(--div); margin-top: 8px; }
  @keyframes indeterminate { 0%{width:5%;margin-left:0}50%{width:35%;margin-left:40%}100%{width:5%;margin-left:95%} }

  .error-box { background: #FEE2E2; border: 1px solid #FECACA; padding: 12px 16px; border-radius: 3px; margin-bottom: 24px; font-size: 13px; color: #991B1B; }
  .info-box { background: rgba(61,74,42,0.04); border-left: 3px solid var(--lime); padding: 14px 18px; margin-bottom: 24px; border-radius: 0 3px 3px 0; font-size: 13px; }

  .summary-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--dark-olive); border-radius: 3px; margin-bottom: 24px; color: var(--white); font-size: 13px; }
  .summary-bar .tag { font-family: var(--mono); font-size: 11px; color: var(--light-lime); opacity: 0.6; }

  /* Thread group */
  .thread-group { margin-bottom: 32px; border: 1px solid var(--div); border-radius: 4px; overflow: hidden; }
  .thread-header { background: var(--dark-olive); color: var(--white); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .thread-subject { font-family: var(--serif); font-size: 16px; font-weight: 600; }
  .thread-count { font-family: var(--mono); font-size: 10px; color: var(--light-lime); opacity: 0.7; }

  .email-card { padding: 18px 20px; border-bottom: 1px solid var(--div); background: var(--white); }
  .email-card:last-child { border-bottom: none; }
  .email-card.thread-child { border-left: 4px solid var(--lime); background: #FAFAF4; }

  .email-counter { font-family: var(--mono); font-size: 11px; color: var(--div); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .badge-important { font-family: var(--sans); font-size: 9px; font-weight: 700; color: var(--dark-olive); background: rgba(212,225,87,0.33); padding: 2px 7px; border-radius: 2px; letter-spacing: 0.04em; }
  .email-subject { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--dark-olive); margin-bottom: 10px; line-height: 1.3; outline: none; border-bottom: 1px dashed rgba(200,192,180,0.33); padding-bottom: 4px; cursor: text; }
  .meta-row { display: flex; gap: 12px; margin-bottom: 3px; align-items: baseline; }
  .meta-label { font-size: 10px; font-weight: 700; color: var(--olive); letter-spacing: 0.05em; min-width: 44px; }
  .meta-value { font-size: 12px; color: var(--char); }
  .meta-value[contenteditable] { outline: none; border-bottom: 1px dashed rgba(200,192,180,0.27); flex: 1; cursor: text; }
  .email-body { font-size: 12.5px; line-height: 1.6; color: var(--char); white-space: pre-wrap; word-break: break-word; margin-top: 12px; padding: 10px 12px; background: var(--cream); border-radius: 3px; border: 1px solid rgba(200,192,180,0.27); outline: none; cursor: text; min-height: 40px; max-height: 300px; overflow-y: auto; }
  .email-img { margin-top: 10px; max-width: 100%; border-radius: 3px; border: 1px solid var(--div); }
  .att-label { font-size: 9px; font-weight: 700; color: var(--olive); letter-spacing: 0.05em; }
  .att-item { font-family: var(--mono); font-size: 10px; color: var(--olive); margin-top: 3px; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left"><div class="header-mark"></div><span class="header-name">Solidarity</span></div>
  <div class="header-right">
    <span class="header-email" id="userEmail"></span>
    <button class="btn-sign-out hidden" id="btnSignOut" onclick="signOut()">Sign Out</button>
  </div>
</div>
<div class="main">
  <h1>Topsheet</h1>
  <p class="date-line" id="todayLine"></p>
  <div class="auth-gate" id="authGate">
    <p>Sign in with your Solidarity Google account to pull today's emails.</p>
    <p class="subtitle">Read-only access. Nothing is sent, modified, or deleted.</p>
    <button class="btn btn-google" onclick="signIn()">Sign in with Google</button>
  </div>
  <div class="hidden" id="appContent">
    <div class="hidden" id="progressBox"></div>
    <div class="hidden" id="errorBox"></div>
    <div class="button-row">
      <button class="btn btn-primary" id="btnPull" onclick="pullEmails()">Pull Today's Emails</button>
      <button class="btn btn-lime hidden" id="btnDownload" onclick="downloadDocx()">Download .docx</button>
    </div>
    <div class="hidden" id="summaryBar"></div>
    <div id="emailList"></div>
  </div>
</div>

<script>
// ─── Config ─────────────────────────────────────────
const CLIENT_ID = '281918788023-vrovhri278b75412kpmla9h1r28dbtde.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly';
const _now = new Date();
const _today = _now.getFullYear() + '/' + String(_now.getMonth()+1).padStart(2,'0') + '/' + String(_now.getDate()).padStart(2,'0');
const GMAIL_QUERY = 'is:unread -category:promotions -category:updates -category:forums -category:social -in:sent after:' + _today;

let accessToken = null;
let emails = [];
let threads = [];
let tokenClient = null;

document.getElementById('todayLine').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

window.onload = function() {
  tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: handleAuthResponse });
};

function handleAuthResponse(response) {
  if (response.access_token) {
    accessToken = response.access_token;
    document.getElementById('authGate').classList.add('hidden');
    document.getElementById('appContent').classList.remove('hidden');
    document.getElementById('btnSignOut').classList.remove('hidden');
    fetch('https://www.googleapis.com/gmail/v1/users/me/profile', { headers: { Authorization: 'Bearer ' + accessToken } })
      .then(r => r.json()).then(d => { document.getElementById('userEmail').textContent = d.emailAddress || ''; }).catch(() => {});
  }
}
function signIn() { tokenClient.requestAccessToken(); }
function signOut() {
  if (accessToken) fetch('https://oauth2.googleapis.com/revoke?token=' + accessToken, { method: 'POST' }).catch(() => {});
  accessToken = null; emails = []; threads = [];
  document.getElementById('authGate').classList.remove('hidden');
  document.getElementById('appContent').classList.add('hidden');
  document.getElementById('btnSignOut').classList.add('hidden');
  document.getElementById('userEmail').textContent = '';
  document.getElementById('emailList').innerHTML = '';
  document.getElementById('summaryBar').classList.add('hidden');
  document.getElementById('btnDownload').classList.add('hidden');
}

// ─── Helpers ────────────────────────────────────────
function parseSender(raw) {
  if (!raw) return { name: '', email: '' };
  const m = raw.match(/^(.*?)\s*<(.+?)>$/);
  return m ? { name: m[1].trim().replace(/^"|"$/g, ''), email: m[2] } : { name: '', email: raw.trim() };
}
function fmtDate(ts) { return ts ? new Date(parseInt(ts)).toLocaleDateString('en-US', { weekday:'short',month:'short',day:'numeric',year:'numeric' }) : ''; }
function fmtTime(ts) { return ts ? new Date(parseInt(ts)).toLocaleTimeString('en-US', { hour:'numeric',minute:'2-digit',hour12:true }) : ''; }
function getHeader(headers, name) { const h = (headers||[]).find(x => x.name.toLowerCase() === name.toLowerCase()); return h ? h.value : ''; }

function b64decode(data) {
  const bin = atob(data.replace(/-/g, '+').replace(/_/g, '/'));
  return new TextDecoder('utf-8').decode(Uint8Array.from(bin, c => c.charCodeAt(0)));
}

function cleanBody(body) {
  if (!body) return '';
  let text = body.replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')
    .replace(/\u2018|\u2019/g,"'").replace(/\u201C|\u201D/g,'"');
  text = text.replace(/\r\n/g, '\n');
  text = text.replace(/\n\s*On\s+[A-Z][a-z]{2}[\s\S]*?\s+wrote:\s*\n[\s\S]*$/m, '');
  text = text.replace(/\n\s*>.*$/gm, '');
  text = text.replace(/https?:\/\/[^\s\r\n]+/g, '[link]').replace(/\n{4,}/g, '\n\n\n')
    .replace(/You are receiving this email because.*$/s, '')
    .replace(/Forwarding this invitation could.*$/s, '')
    .replace(/--\s*\n\s*\u25A0[\s\S]*$/m, '');
  return text.trim().substring(0, 3000);
}

function decodeBody(payload) {
  if (!payload) return '';
  if (payload.body && payload.body.data) { try { return b64decode(payload.body.data); } catch { return ''; } }
  if (payload.parts) {
    for (const p of payload.parts) { if (p.mimeType === 'text/plain' && p.body && p.body.data) { try { return b64decode(p.body.data); } catch { continue; } } }
    for (const p of payload.parts) { if (p.parts) { const n = decodeBody(p); if (n) return n; } }
    for (const p of payload.parts) { if (p.mimeType === 'text/html' && p.body && p.body.data) { try { const h = b64decode(p.body.data); const d = new DOMParser().parseFromString(h,'text/html'); return d.body?d.body.textContent:''; } catch { continue; } } }
  }
  return '';
}

function getAttachments(payload, msgId) {
  const att = [];
  if (!payload) return att;
  function walk(p) {
    if (p.filename && p.filename.length > 0 && p.body) {
      const isImage = (p.mimeType || '').startsWith('image/');
      att.push({
        filename: p.filename, mimeType: p.mimeType || 'file', size: p.body.size || 0,
        attachmentId: p.body.attachmentId || null, msgId: msgId, isImage: isImage,
        b64data: null
      });
    }
    if (p.parts) p.parts.forEach(walk);
  }
  walk(payload);
  return att;
}

// ─── Progress UI ────────────────────────────────────
function showProgress(msg, current, total) {
  const box = document.getElementById('progressBox');
  const pct = total > 0 ? Math.round((current / total) * 100) : 0;
  box.className = 'progress-box'; box.classList.remove('hidden');
  box.innerHTML = `<div class="progress-top"><span class="progress-msg">${msg}</span>${total>0?`<span class="progress-pct">${pct}%</span>`:''}</div><div class="progress-bar"><div class="progress-fill ${total===0?'indeterminate':''}" style="${total>0?'width:'+pct+'%':''}"></div></div>${total>0?`<div class="progress-sub">${current} of ${total}</div>`:'<div class="progress-sub">This usually takes 15\u201345 seconds.</div>'}`;
}
function hideProgress() { document.getElementById('progressBox').classList.add('hidden'); }
function showError(msg) { const b=document.getElementById('errorBox'); b.className='error-box'; b.classList.remove('hidden'); b.textContent=msg; }
function hideError() { document.getElementById('errorBox').classList.add('hidden'); }

// ─── Pull Emails ────────────────────────────────────
async function pullEmails() {
  if (!accessToken) return;
  emails = []; threads = [];
  document.getElementById('emailList').innerHTML = '';
  document.getElementById('summaryBar').classList.add('hidden');
  document.getElementById('btnDownload').classList.add('hidden');
  document.getElementById('btnPull').disabled = true;
  document.getElementById('btnPull').textContent = 'Pulling...';
  hideError();
  showProgress('Searching Primary inbox...', 0, 0);

  try {
    const listRes = await fetch('https://www.googleapis.com/gmail/v1/users/me/messages?q=' + encodeURIComponent(GMAIL_QUERY) + '&maxResults=50', { headers: { Authorization: 'Bearer ' + accessToken } });
    const listData = await listRes.json();
    if (listData.error) { if (listData.error.code === 401) { signOut(); showError('Session expired.'); return; } throw new Error(listData.error.message); }

    const ids = listData.messages || [];
    if (ids.length === 0) {
      hideProgress();
      document.getElementById('progressBox').className = 'info-box'; document.getElementById('progressBox').classList.remove('hidden');
      document.getElementById('progressBox').textContent = 'No unread Primary emails found for today.';
      document.getElementById('btnPull').disabled = false; document.getElementById('btnPull').textContent = "Pull Today's Emails"; return;
    }

    showProgress('Reading emails...', 0, ids.length);

    for (let i = 0; i < ids.length; i++) {
      showProgress('Reading ' + (i+1) + '/' + ids.length + '...', i+1, ids.length);
      const msgRes = await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/' + ids[i].id + '?format=full', { headers: { Authorization: 'Bearer ' + accessToken } });
      const msg = await msgRes.json();
      const headers = msg.payload ? msg.payload.headers || [] : [];

      emails.push({
        id: ids[i].id,
        threadId: ids[i].threadId || msg.threadId || ids[i].id,
        from: getHeader(headers, 'From'),
        to: getHeader(headers, 'To'),
        cc: getHeader(headers, 'Cc'),
        subject: getHeader(headers, 'Subject'),
        body: cleanBody(decodeBody(msg.payload)),
        date: msg.internalDate,
        dateFormatted: fmtDate(msg.internalDate) + ' at ' + fmtTime(msg.internalDate),
        attachments: getAttachments(msg.payload, ids[i].id),
        important: (msg.labelIds || []).includes('IMPORTANT'),
      });
    }

    // Download image attachments
    const imageAtts = [];
    emails.forEach(em => em.attachments.forEach(a => { if (a.isImage && a.attachmentId) imageAtts.push(a); }));
    if (imageAtts.length > 0) {
      showProgress('Downloading ' + imageAtts.length + ' image(s)...', 0, imageAtts.length);
      for (let i = 0; i < imageAtts.length; i++) {
        showProgress('Image ' + (i+1) + '/' + imageAtts.length + ': ' + imageAtts[i].filename, i+1, imageAtts.length);
        try {
          const attRes = await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/' + imageAtts[i].msgId + '/attachments/' + imageAtts[i].attachmentId, { headers: { Authorization: 'Bearer ' + accessToken } });
          const attData = await attRes.json();
          if (attData.data) imageAtts[i].b64data = attData.data.replace(/-/g, '+').replace(/_/g, '/');
        } catch { /* skip */ }
      }
    }

    // Group by thread
    const threadMap = new Map();
    emails.forEach(em => {
      if (!threadMap.has(em.threadId)) threadMap.set(em.threadId, []);
      threadMap.get(em.threadId).push(em);
    });
    const seen = new Set();
    emails.forEach(em => {
      if (!seen.has(em.threadId)) {
        seen.add(em.threadId);
        const msgs = threadMap.get(em.threadId);
        msgs.sort((a, b) => parseInt(a.date) - parseInt(b.date));
        threads.push({ threadId: em.threadId, subject: msgs[0].subject || 'No Subject', messages: msgs, important: msgs.some(m => m.important) });
      }
    });

    hideProgress();
    renderEmails();
  } catch (err) { hideProgress(); showError(err.message || 'Failed to fetch emails'); }
  document.getElementById('btnPull').disabled = false;
  document.getElementById('btnPull').textContent = "Pull Today's Emails";
}

// ─── Render ─────────────────────────────────────────
function renderEmails() {
  if (emails.length === 0) return;
  const impCount = emails.filter(e => e.important).length;
  const bar = document.getElementById('summaryBar');
  bar.className = 'summary-bar'; bar.classList.remove('hidden');
  bar.innerHTML = `<span>${emails.length} emails in ${threads.length} threads \u00B7 ${impCount} important</span><span class="tag">editable</span>`;
  document.getElementById('btnDownload').classList.remove('hidden');

  const list = document.getElementById('emailList');
  list.innerHTML = '';

  threads.forEach((thread) => {
    const group = document.createElement('div');
    group.className = 'thread-group';
    const isMulti = thread.messages.length > 1;

    if (isMulti) {
      group.innerHTML = `<div class="thread-header"><span class="thread-subject">${escHtml(thread.subject)}</span><span class="thread-count">${thread.messages.length} messages</span></div>`;
    }

    thread.messages.forEach((em, mi) => {
      const gi = emails.indexOf(em);
      const from = parseSender(em.from);
      const card = document.createElement('div');
      card.className = 'email-card' + (isMulti && mi > 0 ? ' thread-child' : '');

      let metaHtml = `<div class="meta-row"><span class="meta-label">FROM</span><span class="meta-value" contenteditable onblur="updateEmail(${gi},'from',this.textContent)">${escHtml(from.name ? from.name + ' <' + from.email + '>' : from.email)}</span></div>
        <div class="meta-row"><span class="meta-label">TO</span><span class="meta-value" contenteditable onblur="updateEmail(${gi},'to',this.textContent)">${escHtml(em.to)}</span></div>`;
      if (em.cc) metaHtml += `<div class="meta-row"><span class="meta-label">CC</span><span class="meta-value" contenteditable onblur="updateEmail(${gi},'cc',this.textContent)">${escHtml(em.cc)}</span></div>`;
      metaHtml += `<div class="meta-row"><span class="meta-label">DATE</span><span class="meta-value">${escHtml(em.dateFormatted)}</span></div>`;

      let imgHtml = '';
      em.attachments.forEach(a => {
        if (a.isImage && a.b64data) imgHtml += `<img class="email-img" src="data:${a.mimeType};base64,${a.b64data}" alt="${escHtml(a.filename)}">`;
      });

      let attHtml = '';
      const nonImg = em.attachments.filter(a => !a.isImage);
      if (nonImg.length > 0) {
        attHtml = '<div style="margin-top:10px"><span class="att-label">ATTACHMENTS</span>';
        nonImg.forEach(a => { attHtml += '<div class="att-item">\uD83D\uDCCE ' + escHtml(a.filename) + ' (' + escHtml(a.mimeType) + (a.size ? ', ' + Math.round(a.size/1024) + 'KB' : '') + ')</div>'; });
        attHtml += '</div>';
      }

      card.innerHTML = `
        <div class="email-counter"><span>${String(gi+1).padStart(2,'0')}/${String(emails.length).padStart(2,'0')}</span>${em.important ? '<span class="badge-important">IMPORTANT</span>' : ''}</div>
        <div class="email-subject" contenteditable onblur="updateEmail(${gi},'subject',this.textContent)">${escHtml(em.subject || 'No Subject')}</div>
        ${metaHtml}
        <div class="email-body" contenteditable onblur="updateEmail(${gi},'body',this.textContent)">${escHtml(em.body)}</div>
        ${imgHtml}${attHtml}`;
      group.appendChild(card);
    });
    list.appendChild(group);
  });
}

function escHtml(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
function updateEmail(i, field, value) { if (emails[i]) emails[i][field] = value; }

// ─── DOCX Generation (raw XML + ZIP, zero deps) ────

function createZip(files) {
  const enc = new TextEncoder();
  const parts = []; const centralDir = []; let offset = 0;
  for (const { name, data } of files) {
    const nameBytes = enc.encode(name);
    const content = typeof data === 'string' ? enc.encode(data) : new Uint8Array(data);
    const local = new Uint8Array(30 + nameBytes.length + content.length);
    const v = new DataView(local.buffer);
    v.setUint32(0,0x04034b50,true); v.setUint16(4,20,true); v.setUint16(6,0,true); v.setUint16(8,0,true);
    v.setUint16(10,0,true); v.setUint16(12,0,true);
    const crc = crc32(content);
    v.setUint32(14,crc,true); v.setUint32(18,content.length,true); v.setUint32(22,content.length,true);
    v.setUint16(26,nameBytes.length,true); v.setUint16(28,0,true);
    local.set(nameBytes, 30); local.set(content, 30 + nameBytes.length);
    parts.push(local);
    const central = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(central.buffer);
    cv.setUint32(0,0x02014b50,true); cv.setUint16(4,20,true); cv.setUint16(6,20,true);
    cv.setUint16(8,0,true); cv.setUint16(10,0,true); cv.setUint16(12,0,true); cv.setUint16(14,0,true);
    cv.setUint32(16,crc,true); cv.setUint32(20,content.length,true); cv.setUint32(24,content.length,true);
    cv.setUint16(28,nameBytes.length,true); cv.setUint16(30,0,true); cv.setUint16(32,0,true);
    cv.setUint16(34,0,true); cv.setUint16(36,0,true); cv.setUint32(38,0,true); cv.setUint32(42,offset,true);
    central.set(nameBytes, 46); centralDir.push(central);
    offset += local.length;
  }
  const cdOffset = offset; let cdSize = 0; centralDir.forEach(c => cdSize += c.length);
  const eocd = new Uint8Array(22); const ev = new DataView(eocd.buffer);
  ev.setUint32(0,0x06054b50,true); ev.setUint16(4,0,true); ev.setUint16(6,0,true);
  ev.setUint16(8,files.length,true); ev.setUint16(10,files.length,true);
  ev.setUint32(12,cdSize,true); ev.setUint32(16,cdOffset,true); ev.setUint16(20,0,true);
  const total = new Uint8Array(offset + cdSize + 22); let pos = 0;
  parts.forEach(p => { total.set(p, pos); pos += p.length; });
  centralDir.forEach(c => { total.set(c, pos); pos += c.length; });
  total.set(eocd, pos);
  return total;
}

function crc32(data) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) { c ^= data[i]; for (let j = 0; j < 8; j++) c = (c>>>1)^(c&1?0xEDB88320:0); }
  return (c^0xFFFFFFFF)>>>0;
}

function escXml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

function xmlP(text, opts = {}) {
  const { font='Arial', size=20, color='2C2C2C', bold=false, before=0, after=0, border='' } = opts;
  return `<w:p><w:pPr><w:spacing w:before="${before}" w:after="${after}"/>${border}</w:pPr><w:r><w:rPr><w:rFonts w:ascii="${font}" w:hAnsi="${font}"/><w:sz w:val="${size}"/><w:color w:val="${color}"/>${bold?'<w:b/>':''}</w:rPr><w:t xml:space="preserve">${escXml(text)}</w:t></w:r></w:p>`;
}

function xmlImage(rId, cx, cy) {
  if (cx > 5486400) { const r = 5486400/cx; cx = 5486400; cy = Math.round(cy*r); }
  return `<w:p><w:r><w:drawing><wp:inline distT="0" distB="0" distL="0" distR="0"><wp:extent cx="${cx}" cy="${cy}"/><wp:docPr id="1" name="Image"/><a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:nvPicPr><pic:cNvPr id="0" name="Image"/><pic:cNvPicPr/></pic:nvPicPr><pic:blipFill><a:blip r:embed="${rId}"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill><pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr></pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p>`;
}

const LIME_BORDER = '<w:pBdr><w:left w:val="single" w:sz="24" w:color="D4E157" w:space="8"/></w:pBdr>';

async function downloadDocx() {
  if (!emails.length) return;
  const btn = document.getElementById('btnDownload');
  btn.disabled = true; btn.textContent = 'Generating...';

  try {
    const todayStr = document.getElementById('todayLine').textContent;
    const imageFiles = [];
    const imageRels = [];
    let imgIdx = 0;

    // Collect images
    emails.forEach(em => {
      em.attachments.forEach(a => {
        if (a.isImage && a.b64data) {
          imgIdx++;
          const ext = a.mimeType.includes('png') ? 'png' : (a.mimeType.includes('gif') ? 'gif' : 'jpeg');
          const rId = 'rImg' + imgIdx;
          const raw = atob(a.b64data);
          const bytes = new Uint8Array(raw.length);
          for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
          imageFiles.push({ name: 'word/media/image' + imgIdx + '.' + ext, data: bytes });
          imageRels.push({ rId, target: 'media/image' + imgIdx + '.' + ext, type: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/image' });
          a._rId = rId;
        }
      });
    });

    // Build document XML
    let body = '';
    body += xmlP('\u25A0  Solidarity of Unbridled Labour', { font:'Arial', size:18, bold:true, color:'1A1A1A', after:40 });
    body += '<w:p><w:pPr><w:spacing w:before="800"/></w:pPr></w:p>';
    body += xmlP('Topsheet', { font:'Georgia', size:72, color:'3D4A2A', after:60 });
    body += `<w:p><w:pPr><w:spacing w:after="20"/><w:pBdr><w:bottom w:val="single" w:sz="8" w:color="3D4A2A"/></w:pBdr></w:pPr></w:p>`;
    body += xmlP(todayStr, { font:'Arial', size:22, color:'6B7A4F', before:80 });
    body += xmlP(emails.length + ' emails in ' + threads.length + ' threads', { font:'Arial', size:18, color:'C8C0B4', before:40 });
    body += '<w:p><w:r><w:br w:type="page"/></w:r></w:p>';

    let emailNum = 0;
    threads.forEach((thread, ti) => {
      if (ti > 0) body += `<w:p><w:pPr><w:spacing w:before="300" w:after="300"/><w:pBdr><w:bottom w:val="single" w:sz="6" w:color="3D4A2A"/></w:pBdr></w:pPr></w:p>`;

      const isMulti = thread.messages.length > 1;

      if (isMulti) {
        body += `<w:p><w:pPr><w:spacing w:before="120" w:after="60"/><w:shd w:val="clear" w:color="auto" w:fill="3D4A2A"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Georgia" w:hAnsi="Georgia"/><w:sz w:val="24"/><w:b/><w:color w:val="FFFFFF"/></w:rPr><w:t xml:space="preserve">  ${escXml(thread.subject)}  (${thread.messages.length} messages)</w:t></w:r></w:p>`;
      }

      thread.messages.forEach((em, mi) => {
        emailNum++;
        const isChild = isMulti && mi > 0;
        const bdr = isChild ? LIME_BORDER : '';

        let counter = String(emailNum).padStart(2,'0') + ' / ' + String(emails.length).padStart(2,'0');
        if (em.important) counter += '   IMPORTANT';
        body += xmlP(counter, { font:'Courier New', size:16, color:'C8C0B4', before:isChild?120:180, after:40, border:bdr });
        body += xmlP(em.subject || 'No Subject', { font:'Georgia', size:28, bold:true, color:'3D4A2A', before:40, after:120, border:bdr });

        const meta = [['FROM', em.from], ['TO', em.to]];
        if (em.cc) meta.push(['CC', em.cc]);
        meta.push(['DATE', em.dateFormatted]);
        meta.forEach(([label, value]) => {
          body += `<w:p><w:pPr><w:spacing w:before="20" w:after="20"/>${bdr}</w:pPr><w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="14"/><w:b/><w:color w:val="6B7A4F"/></w:rPr><w:t xml:space="preserve">${escXml(label)}    </w:t></w:r><w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="18"/><w:color w:val="2C2C2C"/></w:rPr><w:t xml:space="preserve">${escXml(value || '')}</w:t></w:r></w:p>`;
        });

        body += `<w:p><w:pPr><w:spacing w:before="80"/>${bdr}</w:pPr></w:p>`;

        (em.body || '').split('\n').forEach(line => {
          body += `<w:p><w:pPr><w:spacing w:after="40"/>${bdr}</w:pPr><w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="19"/><w:color w:val="2C2C2C"/></w:rPr><w:t xml:space="preserve">${escXml(line || ' ')}</w:t></w:r></w:p>`;
        });

        // Inline images
        em.attachments.forEach(a => {
          if (a.isImage && a._rId) body += xmlImage(a._rId, 3657600, 2743200);
        });

        // Non-image attachments
        const nonImg = em.attachments.filter(a => !a.isImage);
        if (nonImg.length > 0) {
          body += xmlP('ATTACHMENTS', { font:'Arial', size:14, bold:true, color:'6B7A4F', before:120, after:40 });
          nonImg.forEach(a => { body += xmlP('  ' + a.filename + ' (' + a.mimeType + (a.size ? ', ' + Math.round(a.size/1024) + 'KB' : '') + ')', { font:'Courier New', size:16, color:'6B7A4F', after:20 }); });
        }
      });
    });

    body += '<w:p><w:pPr><w:spacing w:before="400"/></w:pPr></w:p>';
    body += `<w:p><w:pPr><w:pBdr><w:top w:val="single" w:sz="6" w:color="3D4A2A"/></w:pBdr></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="14"/><w:color w:val="C8C0B4"/></w:rPr><w:t xml:space="preserve">\u25A0  Solidarity of Unbridled Labour  \u00B7  Generated ${escXml(todayStr)}</w:t></w:r></w:p>`;

    const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas" xmlns:mo="http://schemas.microsoft.com/office/mac/office/2008/main" xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" xmlns:w10="urn:schemas-microsoft-com:office:word" xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:wne="http://schemas.microsoft.com/office/word/2006/wordml">
<w:body>${body}
<w:sectPr><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440"/></w:sectPr>
</w:body></w:document>`;

    const extSet = new Set();
    imageFiles.forEach(f => { const e = f.name.split('.').pop(); extSet.add(e); });
    let ctExtras = '';
    if (extSet.has('jpeg')) ctExtras += '<Default Extension="jpeg" ContentType="image/jpeg"/>';
    if (extSet.has('png')) ctExtras += '<Default Extension="png" ContentType="image/png"/>';
    if (extSet.has('gif')) ctExtras += '<Default Extension="gif" ContentType="image/gif"/>';

    const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/>${ctExtras}<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`;
    const rels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`;
    let wre = ''; imageRels.forEach(r => { wre += `<Relationship Id="${r.rId}" Type="${r.type}" Target="${r.target}"/>`; });
    const wordRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${wre}</Relationships>`;

    const zip = createZip([
      { name: '[Content_Types].xml', data: contentTypes },
      { name: '_rels/.rels', data: rels },
      { name: 'word/_rels/document.xml.rels', data: wordRels },
      { name: 'word/document.xml', data: documentXml },
      ...imageFiles,
    ]);

    const blob = new Blob([zip], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'Topsheet_' + new Date().toISOString().split('T')[0] + '.docx';
    a.click(); URL.revokeObjectURL(url);
  } catch (err) { showError('Failed to generate .docx: ' + err.message); }
  btn.disabled = false; btn.textContent = 'Download .docx';
}
</script>
</body>
</html>
